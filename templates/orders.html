<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders — StyleCart</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<nav class="navbar">
  <a href="/" class="nav-brand">StyleCart</a>
  <ul class="nav-links">
    <li><a href="/">Shop</a></li>
    <li><a href="/cart">Cart</a></li>
    <li><a href="/orders">Orders</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:0.75rem;">
    <a href="/cart" class="nav-cart-icon" id="nav-cart-wrap" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      Cart
      <span class="cart-badge" id="cart-badge" style="display:none;">0</span>
    </a>
    <div id="nav-auth" style="display:none;gap:0.5rem;" class="nav-links">
      <a href="/login">Login</a>
      <a href="/register" class="btn btn-primary btn-sm">Register</a>
    </div>
    <div id="nav-user" style="display:none;align-items:center;gap:0.75rem;" class="nav-user"></div>
  </div>
</nav>

<!-- Auth gate -->
<div id="gate" class="page" style="display:none;">
  <div class="gate">
    <div class="gate-code">🔒</div>
    <h2>Sign in to view your orders</h2>
    <p>Track your purchases and order history after logging in.</p>
    <a href="/login" class="btn btn-primary btn-lg">Sign In</a>
  </div>
</div>

<!-- Orders content -->
<div id="orders-page" class="page" style="display:none;">
  <div style="margin-bottom:2rem;">
    <h1 class="page-title">Order History</h1>
    <p class="page-subtitle" id="orders-count-label">Loading…</p>
  </div>

  <div id="orders-loading" style="text-align:center;padding:3rem;">
    <div class="spinner"></div>
  </div>

  <div id="orders-empty" class="empty-state" style="display:none;">
    <div class="empty-icon">📦</div>
    <h3>No orders yet</h3>
    <p>Once you place an order it will appear here.</p>
    <a href="/" class="btn btn-primary">Start Shopping</a>
  </div>

  <div id="orders-list" style="display:none;max-width:820px;"></div>
</div>

<script src="/static/js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const user = await loadUser();
    if (!user) {
      document.getElementById('gate').style.display = 'block';
      return;
    }
    document.getElementById('orders-page').style.display = 'block';
    await loadOrders();
  });

  async function loadOrders() {
    try {
      const orders = await api('/api/orders/');
      document.getElementById('orders-loading').style.display = 'none';

      const label = document.getElementById('orders-count-label');
      label.textContent = `${orders.length} order${orders.length !== 1 ? 's' : ''} placed`;

      if (!orders.length) {
        document.getElementById('orders-empty').style.display = 'block';
        return;
      }

      const listEl = document.getElementById('orders-list');
      listEl.style.display = 'block';
      listEl.innerHTML = orders.map(order => `
        <div class="order-card">
          <div class="order-header">
            <div>
              <div class="order-id">ORDER #${order.id.slice(-8).toUpperCase()}</div>
              <div class="order-date">${fmtDate(order.created_at)}</div>
            </div>
            <div class="order-total">${fmt(order.total)}</div>
          </div>
          <div class="order-items-list">
            ${order.items.map(item => `
              <div class="order-item-row">
                <span>${item.name}</span>
                <span style="color:var(--text-muted);">×${item.quantity}</span>
                <span>${fmt(item.price * item.quantity)}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    } catch (e) {
      document.getElementById('orders-loading').style.display = 'none';
      showToast('Failed to load orders', 'error');
    }
  }
</script>
</body>
</html>
