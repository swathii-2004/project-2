<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — StyleCart</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<nav class="navbar">
  <a href="/" class="nav-brand">StyleCart</a>
  <ul class="nav-links">
    <li><a href="/">Shop</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:0.75rem;">
    <div id="nav-auth" style="display:none;gap:0.5rem;" class="nav-links">
      <a href="/login">Login</a>
      <a href="/register" class="btn btn-primary btn-sm active">Register</a>
    </div>
    <div id="nav-user" style="display:none;align-items:center;gap:0.75rem;" class="nav-user"></div>
  </div>
</nav>

<div class="page-sm">
  <div class="form-card">
    <h1 class="form-title">Create account</h1>
    <p class="form-sub">Join StyleCart — free & takes 30 seconds</p>

    <div class="alert alert-error" id="error-msg"></div>
    <div class="alert alert-success" id="success-msg"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Jane Doe" autocomplete="name" />
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" />
    </div>

    <button class="btn btn-primary btn-full btn-lg" id="register-btn" onclick="doRegister()">
      Create Account
    </button>

    <div class="form-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const u = await loadUser();
    if (u) window.location.href = '/';
  });

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

  async function doRegister() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('error-msg');
    const sucEl = document.getElementById('success-msg');
    const btn = document.getElementById('register-btn');

    errEl.classList.remove('show');
    sucEl.classList.remove('show');

    if (!name || !email || !password) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.classList.add('show');
      return;
    }
    if (password.length < 6) {
      errEl.textContent = 'Password must be at least 6 characters.';
      errEl.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account…';

    try {
      await api('/api/auth/register', { method: 'POST', body: { name, email, password } });
      sucEl.textContent = 'Account created! Redirecting to login…';
      sucEl.classList.add('show');
      setTimeout(() => { window.location.href = '/login'; }, 1500);
    } catch (e) {
      errEl.textContent = e.detail || 'Registration failed.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }
</script>
</body>
</html>
